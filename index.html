<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelMind AI — Turn words into stunning images</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --border: #2a2a40;
      --border-soft: #1a1a2e;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent-light: #c4b5fd;
      --text: #f0eeff;
      --muted: #9090b0;
      --dim: #6060a0;
      --dimmer: #3a3a5a;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border-soft);
      background: rgba(8,8,16,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .btn-nav {
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent-light);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-nav:hover { background: rgba(124,58,237,0.1); }
    .btn-nav-primary {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-nav-primary:hover { opacity: 0.88; }
    .credits-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--border-soft);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--accent-light);
    }
    #user-greeting { font-size: 0.82rem; color: var(--muted); }

    /* ── SETUP BANNER ── */
    .setup-wrap { padding: 12px 32px; }
    .setup-banner {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 12px;
      padding: 16px 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .setup-banner strong { color: #fbbf24; }
    .setup-banner span { color: #d1a84b; font-size: 0.88rem; }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 80px 24px 60px;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero-tag {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 99px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      color: var(--accent-light);
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .hero h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .hero h1 .gradient-text {
      background: linear-gradient(135deg, #a78bfa, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* ── GENERATOR ── */
    .gen-box { max-width: 760px; margin: 0 auto 60px; padding: 0 24px; }
    .prompt-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 1rem;
